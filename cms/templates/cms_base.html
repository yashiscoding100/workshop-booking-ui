<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title|title }}</title>

    <link rel="stylesheet" href="{% static 'cms/css/bootstrap.min.css' %}">
    <script src="{% static 'cms/js/jquery-3.4.1.slim.min.js' %}"></script>
    <script src="{% static 'cms/js/popper.min.js' %}"></script>
    <script src="{% static 'cms/js/bootstrap.min.js' %}"></script>

    <link rel="stylesheet" href="{% static 'workshop_app/css/base.css' %}" type="text/css"/>

    <style>
        body {
            background-color: #f9fafb;
            font-family: Arial, sans-serif;
            margin-top: 70px;
        }

        .container {
            padding: 20px;
        }

        button {
            background-color: #4f46e5;
            color: white;
            border-radius: 8px;
            border: none;
            padding: 10px 15px;
        }

        button:hover {
            background-color: #4338ca;
            cursor: pointer;
        }

        input, select {
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .nav-link {
            color: #374151 !important;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #4f46e5 !important;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg" style="background:white; box-shadow:0 2px 8px rgba(0,0,0,0.1); padding:10px 20px;">
    
    <a class="navbar-brand" href="/" style="color:#4f46e5; font-weight:bold;">
        FOSSEE Workshops
    </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Workshop Statistics</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Workshop Status</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Propose Workshop</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Workshop Types</a>
            </li>

        </ul>
    </div>
</nav>

<div class="container">
    <div class="card">
        {{ page.content | safe }}
    </div>
</div>

</body>
</html>
